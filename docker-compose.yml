services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: autocontext-app
    container_name: autocontext-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "0"
      PHP_IDE_CONFIG: "serverName=autocontext"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_USER: autocontext
      CLICKHOUSE_PASSWORD: secret
      CLICKHOUSE_ENABLED: "false"
    depends_on:
      - postgres
      - redis

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: autocontext-app
    container_name: autocontext-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=1 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - postgres
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: autocontext-app
    container_name: autocontext-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: autocontext-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  vite:
    image: node:20-alpine
    container_name: autocontext-vite
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./:/var/www/html
    ports: []
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: autocontext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_context
      POSTGRES_USER: auto
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autocontext-redis
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: autocontext-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
      - chlogs:/var/log/clickhouse-server
      - ./docker/clickhouse/users.d:/etc/clickhouse-server/users.d:ro

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: autocontext-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:3.7
    container_name: autocontext-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - kafkadata:/bitnami/kafka

  kafka-connect:
    build:
      context: ./docker/kafka-connect
    container_name: autocontext-kafka-connect
    restart: unless-stopped
    depends_on:
      - kafka
      - clickhouse
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: autocontext-connect
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    ports: []

volumes:
  pgdata:
  chdata:
  chlogs:
  kafkadata:
