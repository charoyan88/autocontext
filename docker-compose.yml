services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: autocontext-app
    container_name: autocontext-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "1"
      PHP_IDE_CONFIG: "serverName=autocontext"
    depends_on:
      - postgres
      - redis

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: autocontext-app
    container_name: autocontext-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=1 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - postgres
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: autocontext-app
    container_name: autocontext-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: autocontext-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  vite:
    image: node:20-alpine
    container_name: autocontext-vite
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: autocontext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_context
      POSTGRES_USER: auto
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: autocontext-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
